<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senara — Sesli Alışveriş Asistanı</title>
  <style>
    /* Extension side panel için inline base styles */
    :root {
      --radius: 0.75rem;
      --background: oklch(0.13 0 0);
      --foreground: oklch(1 0 0);
      --card: oklch(0.18 0 0);
      --card-foreground: oklch(1 0 0);
      --primary: oklch(0.72 0.18 145);
      --primary-foreground: oklch(0.13 0 0);
      --secondary: oklch(0.22 0 0);
      --secondary-foreground: oklch(1 0 0);
      --muted: oklch(0.22 0 0);
      --muted-foreground: oklch(0.72 0 0);
      --accent: oklch(0.72 0.18 145);
      --accent-foreground: oklch(0.13 0 0);
      --destructive: oklch(0.65 0.22 25);
      --destructive-foreground: oklch(1 0 0);
      --border: oklch(0.28 0 0);
      --input: oklch(0.28 0 0);
      --ring: oklch(0.72 0.18 145);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--background);
      color: var(--foreground);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="./sidepanel.jsx"></script>
</body>
</html>
